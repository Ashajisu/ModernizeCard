name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'modernize/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: modernize/package-lock.json

      - name: Install dependencies
        working-directory: ./modernize
        run: npm ci

      - name: Build
        working-directory: ./modernize
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist